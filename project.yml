name: Cosmos
options:
  bundleIdPrefix: com.cosmos
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    TARGETED_DEVICE_FAMILY: 1

targets:
  Cosmos:
    type: application
    platform: iOS
    sources:
      - path: Cosmos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cosmos.app
        INFOPLIST_FILE: Cosmos/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
